---
- name: Installer et configurer Docker et l'application de vote
  hosts: bastion
  become: yes
  vars_files:
    - group_vars/secrets.yaml

  

  tasks:
    - name: Installer les prérequis pour ajouter un dépôt HTTPS
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Créer le dossier pour la clé de sécurité GPG de Docker
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Télécharger et ajouter la clé GPG officielle de Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Ajouter le dépôt officiel Docker à la liste des sources APT
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Installer Docker CE et les dépendances Python
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - python3-docker
        state: present
        update_cache: true

    - name: S'assurer que le service Docker est démarré et activé
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Connexion au registre Docker Hub
      community.general.docker_login:
        username: "{{ docker_username }}"
        password: "{{ docker_password }}"

    # --- CONFIGURATION DU RÉSEAU ET DES IMAGES ---

    - name: Créer le réseau Docker privé pour l'application
      community.docker.docker_network:
        name: voting_network
        state: present

    - name: Pull des images applicatives
      community.docker.docker_image:
        name: "{{ item }}"
        source: pull
        tag: latest
      loop:
        - "mulema/vote"
        - "mulema/result"
        

    # --- LANCEMENT DES CONTENEURS ---

    
          

    - name: Run Vote Container
      community.docker.docker_container:
        name: vote
        image: mulema/vote
        state: started
        restart_policy: always
        ports:
          - "5000:80"
        networks:
          - name: voting_network
        env:
          REDIS_HOST: "redis"
          REDIS_PORT: "6379"
          
    - name: Run Result Container
      community.docker.docker_container:
        name: result
        image: mulema/result
        state: started
        restart_policy: always
        ports:
          - "5001:80"
        networks:
          - name: voting_network
        env:
          PORT: "80"
          PG_HOST: "10.0.3.66"
          PG_USER: "postgres"
          PG_PASSWORD: "postgres"
          PG_NAME: "postgres"
          PG_PORT: "5432"
          REDIS_HOST: "redis"