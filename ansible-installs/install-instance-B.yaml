---
- name: Installer et configurer Redis et worker
  hosts: serveur_prive_1
  become: yes
  vars_files:
    - group_vars/secrets.yaml

  tasks:
    # 1. Installer les prérequis nécessaires pour ajouter des dépôts HTTPS
    - name: Installer les outils requis pour le dépôt Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
          - python3-docker
        state: present
        update_cache: true

    # 2. Créer le dossier pour les clés GPG d'APT
    - name: Créer le dossier keyring
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # 3. Télécharger la clé GPG officielle de Docker
    - name: Ajouter la clé GPG officielle de Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    # 4. Ajouter le dépôt officiel Docker aux sources APT (détecte automatiquement la version d'Ubuntu)
    - name: Ajouter le dépôt stable Docker
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture if ansible_architecture != 'x86_64' else 'amd64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    # 5. Installer le vrai moteur Docker (docker-ce)
    - name: Installer Docker CE et ses dépendances
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    # 6. S'assurer que le service est actif
    - name: Démarrer le service Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # 7. Connexion et lancement des conteneurs
    - name: Connexion au registre Docker Hub
      community.general.docker_login:
        username: "{{ docker_username }}"
        password: "{{ docker_password }}"


    - name: Télécharger images docker
      community.docker.docker_image:
        name: "{{ item }}"
        source: pull
      loop:
        - "mulema/worker"
        - "redis:alpine"    

    - name: Run Redis Container
      community.docker.docker_container:
        name: redis
        image: redis:alpine
        state: started
        restart_policy: always
        networks:
          - name: voting_network
        ports:
          - "6379:6379"  

    - name: Run Postgres/DB Worker Container
      community.docker.docker_container:
        name: worker
        image: mulema/worker
        state: started
        restart_policy: always
        networks:
          - name: voting_network
        env:
          REDIS_HOST: "redis"
          DB_HOST: "10.0.2.254" 
          DB_USERNAME: "postgres"
          DB_PASSWORD: "postgres"
          DB_NAME: "postgres"
  