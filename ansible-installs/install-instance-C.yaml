---
- name: Installer et configurer PostgreSQL
  hosts: serveur_prive_2      
  become: yes
  vars_files:
    - group_vars/secrets.yaml



 
  tasks:
    - name: Update apt package index
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600  
        lock_timeout: 180  

    - name: Installer les prérequis pour ajouter un dépôt HTTPS
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Créer le dossier pour la clé de sécurité GPG de Docker
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Télécharger et ajouter la clé GPG officielle de Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Ajouter le dépôt officiel Docker à la liste des sources APT
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Installer Docker CE (Community Edition) et les dépendances Python
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - python3-docker # Toujours indispensable pour Ansible
        state: present
        update_cache: true

    - name: S'assurer que le service Docker est démarré et activé
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true   


    - name: Connexion au registre Docker Hub
      community.general.docker_login:
        username: "{{ docker_username }}"
        password: "{{ docker_password }}"


    
          
    - name: Lancer le conteneur PostgreSQL sur l'instance privée
      community.docker.docker_container:
        name: db
        image: postgres:15
        state: started
        ports:
         - "5432:5432"
        volumes:
          - pg_data:/var/lib/postgresql/data 
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres   # <-- C'est ce mot de passe qui manquait !
          POSTGRES_DB: postgres
          
         
